spring:
  application:
    name: github-access-repos-app
  cache:
    type: redis
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 10
        max-idle: 5
        min-idle: 1

github:
  token: ${GITHUB_TOKEN}
  api-base-url: https://api.github.com
  org: ${GITHUB_ORG}
  connect-timeout-ms: 5000
  read-timeout-ms: 10000
  max-concurrent-requests: 10
  cache-ttl-minutes: 10

server:
  port: 8080

logging:
  level:
    com.repos.githubaccess: DEBUG